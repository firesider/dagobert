[tool.poetry]
name = "trader"
version = "0.2.0"
description = "Trading workbench for Forex research, signals, backtests, and MetaTrader 5 operations."
authors = ["Fabian"]
readme = "README.md"
packages = [{ include = "trader", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<3.13"
numpy = "^2.2.5"
pandas = "^2.2.3"
pyarrow = "^19.0.1"
ta = "^0.11.0"
yfinance = "^0.2.66"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"

[tool.poetry.group.mt5.dependencies]
MetaTrader5 = { version = "^5.0.5735", markers = "sys_platform == 'win32'" }

[tool.poetry.scripts]
trader = "trader.cli:main"

[tool.pytest.ini_options]
pythonpath = ["src"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
